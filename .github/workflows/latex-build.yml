name: LaTeX Build (Docker)

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run LaTeX build via make script
        run: |
          ./make docker

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Diapositivas-PDF-${{ github.event.pull_request.number || 'Latest' }}
          path: main.pdf
          retention-days: 5
